<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e"/><stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eab308"/><stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="layer6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="layer7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="sleep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/><stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">OpenMemory</text>
  <text x="400" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">A 7-layer cognitive memory system for AI agents — with sleep cycles</text>

  <!-- 7 Layers -->
  <g transform="translate(40, 85)">
    <!-- Layer bars -->
    <rect x="0" y="0" width="480" height="42" rx="6" fill="url(#layer1)" opacity="0.9"/>
    <text x="16" y="26" fill="#fff" font-size="13" font-weight="600">① Sensory Buffer</text>
    <text x="260" y="26" fill="#fce7f3" font-size="11">Working memory · Sentiment · Intent · Urgency</text>

    <rect x="0" y="50" width="480" height="42" rx="6" fill="url(#layer2)" opacity="0.9"/>
    <text x="16" y="76" fill="#fff" font-size="13" font-weight="600">② Semantic Memory</text>
    <text x="260" y="76" fill="#fff7ed" font-size="11">Knowledge graph · Facts · Contradictions</text>

    <rect x="0" y="100" width="480" height="42" rx="6" fill="url(#layer3)" opacity="0.9"/>
    <text x="16" y="126" fill="#422006" font-size="13" font-weight="600">③ Episodic Memory</text>
    <text x="260" y="126" fill="#422006" font-size="11">Experiences · Emotional arcs · Lessons</text>

    <rect x="0" y="150" width="480" height="42" rx="6" fill="url(#layer4)" opacity="0.9"/>
    <text x="16" y="176" fill="#052e16" font-size="13" font-weight="600">④ Identity Layer</text>
    <text x="260" y="176" fill="#052e16" font-size="11">Self-model · Values · Beliefs · Growth edges</text>

    <rect x="0" y="200" width="480" height="42" rx="6" fill="url(#layer5)" opacity="0.9"/>
    <text x="16" y="226" fill="#083344" font-size="13" font-weight="600">⑤ Relational Memory</text>
    <text x="260" y="226" fill="#083344" font-size="11">Person models · Trust vectors · Comm profiles</text>

    <rect x="0" y="250" width="480" height="42" rx="6" fill="url(#layer6)" opacity="0.9"/>
    <text x="16" y="276" fill="#fff" font-size="13" font-weight="600">⑥ Procedural Memory</text>
    <text x="260" y="276" fill="#ede9fe" font-size="11">Learned workflows · Success rates · Triggers</text>

    <rect x="0" y="300" width="480" height="42" rx="6" fill="url(#layer7)" opacity="0.9"/>
    <text x="16" y="326" fill="#fff" font-size="13" font-weight="600">⑦ Meta-Memory</text>
    <text x="260" y="326" fill="#fce7f3" font-size="11">Consolidation · Confidence · Knowledge gaps</text>

    <!-- Cross-layer arrows -->
    <text x="240" y="365" text-anchor="middle" fill="#64748b" font-size="11">↕ Cross-layer connections built during sleep ↕</text>
  </g>

  <!-- Sleep Cycles sidebar -->
  <g transform="translate(560, 85)">
    <rect x="0" y="0" width="200" height="342" rx="8" fill="url(#sleep)" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
    <text x="100" y="28" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">Sleep Cycles</text>

    <!-- Session -->
    <rect x="16" y="45" width="168" height="75" rx="6" fill="#1e1b4b" opacity="0.6"/>
    <text x="100" y="65" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Session Sleep</text>
    <text x="100" y="82" text-anchor="middle" fill="#818cf8" font-size="10">~30 seconds</text>
    <text x="100" y="98" text-anchor="middle" fill="#94a3b8" font-size="9">Embed · Link · Index</text>
    <text x="100" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">After each conversation</text>

    <!-- Nightly -->
    <rect x="16" y="130" width="168" height="85" rx="6" fill="#1e1b4b" opacity="0.6"/>
    <text x="100" y="150" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Nightly Sleep</text>
    <text x="100" y="167" text-anchor="middle" fill="#818cf8" font-size="10">2-5 minutes</text>
    <text x="100" y="183" text-anchor="middle" fill="#94a3b8" font-size="9">Extract lessons · Update person models</text>
    <text x="100" y="196" text-anchor="middle" fill="#94a3b8" font-size="9">Detect contradictions · Cross-layer edges</text>
    <text x="100" y="209" text-anchor="middle" fill="#94a3b8" font-size="9">LLM-powered comprehension</text>

    <!-- Weekly -->
    <rect x="16" y="225" width="168" height="85" rx="6" fill="#1e1b4b" opacity="0.6"/>
    <text x="100" y="245" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Weekly Sleep</text>
    <text x="100" y="262" text-anchor="middle" fill="#818cf8" font-size="10">10-20 minutes</text>
    <text x="100" y="278" text-anchor="middle" fill="#94a3b8" font-size="9">Dedup · Inference · Confidence decay</text>
    <text x="100" y="291" text-anchor="middle" fill="#94a3b8" font-size="9">Full brain health audit</text>
    <text x="100" y="304" text-anchor="middle" fill="#94a3b8" font-size="9">Edge weight recalculation</text>

    <!-- Loop arrow -->
    <text x="100" y="328" text-anchor="middle" fill="#6366f1" font-size="18">↻</text>
  </g>

  <!-- Database layer -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="720" height="55" rx="8" fill="url(#db)" opacity="0.8" stroke="#64748b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="360" y="23" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">PostgreSQL 18</text>
    <text x="160" y="43" text-anchor="middle" fill="#94a3b8" font-size="11">Apache AGE (graph)</text>
    <text x="360" y="43" text-anchor="middle" fill="#94a3b8" font-size="11">pgvector (embeddings)</text>
    <text x="560" y="43" text-anchor="middle" fill="#94a3b8" font-size="11">Ollama bge-m3 (1024-dim)</text>
  </g>

  <!-- Connection lines from layers to DB -->
  <line x1="280" y1="455" x2="280" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="455" x2="400" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="400" y="555" text-anchor="middle" fill="#64748b" font-size="11">MIT License · Built by Cove AI · github.com/peter-j-thompson/openmemory</text>

  <!-- Connection arrow from sleep to layers -->
  <line x1="558" y1="256" x2="522" y2="256" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
